<!DOCTYPE html>
<html>
<head>
  <title>Video Resizer Settings</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      width: 450px;
      margin: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    
    h2 {
      color: #1a1a1a;
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 20px 0;
      text-align: center;
    }
    
    h3 {
      color: #333;
      font-size: 18px;
      font-weight: 500;
      margin: 30px 0 15px 0;
      border-bottom: 2px solid #e0e6ed;
      padding-bottom: 8px;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      margin: 12px 0 4px 0;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.2s ease;
      background: white;
    }
    
    input:focus {
      outline: none;
      border-color: #0a84ff;
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.1);
      transform: translateY(-1px);
    }
    
    #addRule {
      width: 100%;
      padding: 14px 24px;
      margin-top: 20px;
      background: linear-gradient(135deg, #0a84ff 0%, #0066cc 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
    }
    
    #addRule:hover {
      background: linear-gradient(135deg, #0066cc 0%, #0a5fd8 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(10, 132, 255, 0.4);
    }
    
    #addRule:active {
      transform: translateY(0);
    }
    
    .site-entry {
      background: white;
      margin: 12px 0;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e8ecf4;
      transition: all 0.2s ease;
    }
    
    .site-entry:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    
    .site-entry strong {
      color: #1a1a1a;
      font-size: 15px;
      display: block;
      margin-bottom: 8px;
    }
    
    .site-entry .details {
      color: #666;
      font-size: 13px;
      margin-bottom: 12px;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
    }
    
    .edit-btn {
      flex: 1;
      padding: 10px 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }
    
    .edit-btn:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    
    .delete-btn {
      flex: 1;
      padding: 10px 16px;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
    }
    
    .delete-btn:hover {
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    }
    
    .empty-state {
      text-align: center;
      color: #888;
      font-style: italic;
      padding: 40px 20px;
    }

    .site-entry {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      background: white;
      margin: 12px 0;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e8ecf4;
      transition: all 0.2s ease;
    }

    .rule-left {
      flex: 1;
      min-width: 0;  /* Prevents overflow */
    }

    .rule-left strong {
      color: #1a1a1a;
      font-size: 15px;
      display: block;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .details {
      color: #666;
      font-size: 13px;
    }

    .value {
      font-weight: 600;
      color: #0a84ff;
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex-shrink: 0;  
    }

    #fillCurrentUrl {
      position: absolute;
      right: 24px;
      top: 68px;  /* Aligns with URL input */
      padding: 8px 12px;
      background: #6b7280;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    #fillCurrentUrl:hover {
      background: #4b5563;
      transform: scale(1.05);
    }

    #urlPattern {
      position: relative;  /* For absolute positioning */
      padding-right: 100px;  /* Space for button */
    }



  </style>
</head>
<body>
  <h2>Video Resizer</h2>
  
  <label>URL Pattern</label>
  <input id="urlPattern" placeholder="https://keats.kcl.ac.uk/*">
  <button id="fillCurrentUrl" title="Copy URL from current tab">Current URL</button>
  
  <label>Width</label>
  <input id="width" placeholder="90vw">
  
  <label>Height</label>
  <input id="height" placeholder="51vw">
  
  <button id="addRule">Add / Update Rule</button>
  
  <h3>Saved Rules</h3>
  <div id="rulesList">
    <div class="empty-state">No rules yet—add one above!</div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
